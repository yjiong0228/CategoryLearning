# AMR optimization config for Condition 2/3 subjects
engine_config_path: ../model_struct/pmh_amr_cond23.yaml

# Subjects: conditions 3
subjects: [3, 6, 9, 12, 15, 18, 21, 24]
# or use subject_range: [1, 24]

# Paths (relative to this YAML)
data_path: ../../data/processed/Task2_processed.csv
output_dir: ../../results/state-based-AMR-result/pmh/cond3

# Parallelism
n_jobs_subjects: 8
n_jobs_inner: 14

# Repeats
n_repeats: 14
refit_repeats: 256

# Evaluation
# Single value applies to all subjects (cond3)
window_size: 16
stop_at: 1.0
max_trials: null
keep_logs: true

param_grid:
  gamma: [0.05, 0.999]
  w0: [0.01, 1.0]
  # beta removed - now managed by BetaModule with per-hypothesis dynamic evolution

amr_kwargs:
  max_evals: 1000
  coarse_grid_per_dim: 3
  split_factor: 2
  refine_top_k: 3
