# AMR optimization config for Condition 1 subjects
engine_config_path: ../model_struct/pmh_amr_cond1.yaml

# Set subjects after running list_conditions.py; example:
# subjects: [1, 4, 7, 10, 13, 16, 19, 22]
subjects: [1, 4, 7, 10, 13, 16, 19, 22]
# or use subject_range: [1, 24]

# Paths (relative to this YAML)
data_path: ../../data/processed/Task2_processed.csv
output_dir: ../../results/state-based-AMR-result/pmh/cond1

# Parallelism
# Run all 8 subjects in parallel and give each 12 inner workers (≈96 cores total)
n_jobs_subjects: 8
n_jobs_inner: 12

# Repeats
n_repeats: 12
refit_repeats: 128

# Evaluation
# Per-subject window sizes align with the subjects order above (Increased to 16 for smoother plots)
window_size: [16, 16, 16, 16, 16, 16, 16, 16]
stop_at: 1.0
max_trials: null
keep_logs: true

param_grid:
  gamma: [0.05, 0.999]
  w0: [0.01, 1.0]
  # beta removed - now managed by BetaModule with per-hypothesis dynamic evolution

amr_kwargs:
  max_evals: 512
  coarse_grid_per_dim: 3
  split_factor: 2
  refine_top_k: 3
